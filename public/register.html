<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicoAutos | Crear cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              asphalt: "#111827",
              ember: "#c2410c",
              sand: "#f5e7d0",
              steel: "#334155",
            },
            fontFamily: {
              display: ["Oswald", "sans-serif"],
              body: ["Manrope", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Oswald:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/auth.css" />
  </head>
  <body class="min-h-screen bg-stone-950 text-stone-100 font-body">
    <div class="page-shell">
      <div id="navbar-root"></div>
      <main class="auth-layout">
        <section class="auth-card">
          <p class="section-eyebrow">Bienvenido</p>
          <h1 class="section-title">Crea tu cuenta</h1>
          <p class="section-copy">
            Publica tus autos, responde consultas y administra tus anuncios en un
            solo lugar.
          </p>

          <form id="register-form" class="mt-8 space-y-4">
            <div>
              <label class="form-label" for="name">Nombre completo</label>
              <input class="form-input" id="name" name="name" type="text" />
            </div>
            <div>
              <label class="form-label" for="email">Correo</label>
              <input class="form-input" id="email" name="email" type="email" />
            </div>
            <div>
              <label class="form-label" for="password">Contrasena</label>
              <input class="form-input" id="password" name="password" type="password" />
            </div>
            <div>
              <label class="form-label" for="phone">Telefono</label>
              <input class="form-input" id="phone" name="phone" type="text" />
            </div>
            <button class="primary-button w-full" type="submit">Crear cuenta</button>
          </form>

          <div id="auth-feedback" class="mt-4"></div>
          <p class="mt-6 text-sm text-stone-400">
            Ya tienes cuenta?
            <a class="text-amber-300 hover:text-amber-200" href="./login.html">Entrar</a>
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="../assets/js/auth/register.js"></script>
  </body>
</html>
