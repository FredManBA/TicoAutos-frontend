<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicoAutos | Autos en venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              asphalt: "#111827",
              ember: "#c2410c",
              sand: "#f5e7d0",
              steel: "#334155",
            },
            fontFamily: {
              display: ["Oswald", "sans-serif"],
              body: ["Manrope", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Oswald:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/main.css" />
  </head>
  <body class="min-h-screen bg-stone-950 text-stone-100 font-body">
    <div class="page-shell">
      <div id="navbar-root"></div>
      <main class="mx-auto flex w-full max-w-7xl flex-col gap-10 px-4 py-10 lg:px-8">
        <section class="grid gap-10 lg:grid-cols-[320px_1fr]">
          <aside class="glass-panel p-6">
            <p class="section-eyebrow">Busca y compara</p>
            <h1 class="section-title">Encuentra tu proximo auto</h1>
            <p class="section-copy">
              Usa los filtros para encontrar opciones por marca, modelo, año,
              precio o estado.
            </p>
            <form id="vehicle-filters-form" class="mt-6 space-y-4">
              <div>
                <label class="form-label" for="brand">Marca</label>
                <input class="form-input" id="brand" name="brand" type="text" placeholder="Toyota" />
              </div>
              <div>
                <label class="form-label" for="model">Modelo</label>
                <input class="form-input" id="model" name="model" type="text" placeholder="Corolla" />
              </div>
              <div class="grid gap-4 sm:grid-cols-2">
                <div>
                  <label class="form-label" for="yearMin">Año desde</label>
                  <input class="form-input" id="yearMin" name="yearMin" type="number" placeholder="2018" />
                </div>
                <div>
                  <label class="form-label" for="yearMax">Año hasta</label>
                  <input class="form-input" id="yearMax" name="yearMax" type="number" placeholder="2024" />
                </div>
              </div>
              <div class="grid gap-4 sm:grid-cols-2">
                <div>
                  <label class="form-label" for="priceMin">Precio desde</label>
                  <input class="form-input" id="priceMin" name="priceMin" type="number" placeholder="5000" />
                </div>
                <div>
                  <label class="form-label" for="priceMax">Precio hasta</label>
                  <input class="form-input" id="priceMax" name="priceMax" type="number" placeholder="20000" />
                </div>
              </div>
              <div>
                <label class="form-label" for="status">Estado</label>
                <select class="form-input" id="status" name="status">
                  <option value="">Todos</option>
                  <option value="available">Disponible</option>
                  <option value="sold">Vendido</option>
                </select>
              </div>
              <button class="primary-button w-full" type="submit">Aplicar filtros</button>
            </form>
          </aside>

          <section class="flex flex-col gap-6">
            <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
              <div>
                <p class="section-eyebrow">Inicio</p>
                <h2 class="section-title">Autos disponibles</h2>
              </div>
              <div id="catalog-summary" class="text-sm text-stone-300"></div>
            </div>
            <div id="home-feedback"></div>
            <div id="vehicle-list" class="grid gap-5 xl:grid-cols-2"></div>
            <div id="pagination-root"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="../assets/js/pages/home.js"></script>
  </body>
</html>
